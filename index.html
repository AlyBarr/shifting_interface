<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shifting Interface</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="scene" id="scene">
    <div class="hud">
      <p class="label" id="stateLabel">state: curious</p>
      <button class="shift-btn" id="shiftBtn" type="button">Shift State</button>
    </div>

    <section class="fragments-layer" aria-label="Interactive interface study">
      <div class="fragment fragment-a" data-depth="0.28"></div>
      <div class="fragment fragment-b" data-depth="0.44"></div>
      <div class="fragment fragment-c" data-depth="0.62"></div>
      <div class="fragment fragment-d" data-depth="0.82"></div>
      <div class="fragment fragment-e" data-depth="0.38"></div>
    </section>

    <section class="caption">
      <h1>Shifting Interface</h1>
      <p>
        A controlled interactive environment where AI-generated states influence
        composition, motion, and response rather than obvious content.
      </p>
    </section>

    <div class="grain"></div>
    <div class="vignette"></div>
  </main>

  <script src="main.js"></script>
</body>
</html>
