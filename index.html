<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shifting Interface</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="scene" id="scene">
    <div class="halos" id="halos"></div>
    <div class="ribbons" id="ribbons"></div>
    <div class="contours" id="contours"></div>
    <div class="text-fragments" id="textFragments"></div>
    <div class="echo-layer" id="echoLayer"></div>

    <section class="fragments-layer" aria-label="Interactive interface study">
      <div class="fragment fragment-a" data-depth="0.30"></div>
      <div class="fragment fragment-b" data-depth="0.55"></div>
      <div class="fragment fragment-c" data-depth="0.82"></div>
    </section>

    <p class="state-label" id="stateLabel">state: latent</p>
    <button class="shift-btn" id="shiftBtn" type="button">Shift State</button>

    <!-- Hide this block if you want zero UI feel -->
    <section class="caption">
      <h1>Shifting Interface</h1>
      <p>
        AI-generated states alter atmosphere, composition, and interaction response
        in real time.
      </p>
    </section>

    <div class="grain"></div>
    <div class="vignette"></div>
  </main>

  <script src="main.js"></script>
</body>
</html>
